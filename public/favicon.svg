<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 763" fill="none">
  <rect width="814" height="763" fill="#F5EFE7"/>
  <g transform="translate(0, 150)">
    <!-- Infinity loop made of yarn -->
    <path d="M140 200 Q140 120 200 120 Q240 120 270 150 Q300 180 330 200 Q360 220 390 200 Q420 180 450 150 Q480 120 520 120 Q580 120 580 200 Q580 280 520 280 Q480 280 450 250 Q420 220 390 200 Q360 180 330 200 Q300 220 270 250 Q240 280 200 280 Q140 280 140 200 Z" 
