    <!-- Yarn texture lines -->
    <path d="M180 200 Q205 180 230 200 Q255 220 280 200" stroke="#9B7DAE" stroke-width="3" fill="none"/>
    <path d="M180 220 Q205 200 230 220 Q255 240 280 220" stroke="#9B7DAE" stroke-width="3" fill="none"/>
